name: release

on:
  push:
    branches:
      - main

concurrency: release

jobs:
  release:
    name: release
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Configure Git
        run: |
          git config user.name '${{ github.repository_owner }}[bot]'
          git config user.email '${{ github.repository_owner }}[bot]@users.noreply.github.com'

      - name: Generate GitHub API token
        id: generate-token
        uses: getsentry/action-github-app-token@5c1e90706fe007857338ac1bfbd7a4177db2f789 # v4.0.0
        with:
          app_id: ${{ secrets.GH_APP_ID }}
          private_key: ${{ secrets.GH_APP_KEY }}

      - name: Run chart-releaser
        id: chart-releaser
        uses: helm/chart-releaser-action@3e001cb8c68933439c7e721650f20a07a1a5c61e
        with:
          skip_existing: true
        env:
          CR_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Login to GitHub Container Registry
        run: echo "${GITHUB_TOKEN?}" | helm registry login ghcr.io -u "${GITHUB_REPOSITORY_OWNER?}" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push charts to GitHub Container Registry
        if: ${{ steps.chart-releaser.outputs.changed_charts != '' }}
        run: |
          shopt -s nullglob
          cd .cr-release-packages
          for pkg in *.tgz; do
            echo "Pushing '${pkg}' …"
            helm push "${pkg}" "oci://ghcr.io/${GITHUB_REPOSITORY}"
          done
