---
{{- include "bjw-s.common.loader.init" . }}

{{- define "inventree.sharedEnv" -}}
INVENTREE_AUTO_UPDATE: 'True'
INVENTREE_TRUSTED_ORIGINS: http://localhost:8000
{{- if .Values.cnpg.enabled }}
INVENTREE_DB_ENGINE: postgresql
INVENTREE_DB_HOST:
  valueFrom:
    secretKeyRef:
      name: {{ include "bjw-s.common.lib.chart.names.fullname" . }}-postgres-app
      key: host
INVENTREE_DB_PORT:
  valueFrom:
    secretKeyRef:
      name: {{ include "bjw-s.common.lib.chart.names.fullname" . }}-postgres-app
      key: port
INVENTREE_DB_NAME:
  valueFrom:
    secretKeyRef:
      name: {{ include "bjw-s.common.lib.chart.names.fullname" . }}-postgres-app
      key: dbname
INVENTREE_DB_USER:
  valueFrom:
    secretKeyRef:
      name: {{ include "bjw-s.common.lib.chart.names.fullname" . }}-postgres-app
      key: user
INVENTREE_DB_PASSWORD:
  valueFrom:
    secretKeyRef:
      name: {{ include "bjw-s.common.lib.chart.names.fullname" . }}-postgres-app
      key: password
{{- else}}
INVENTREE_DB_ENGINE: sqlite
INVENTREE_DB_NAME: inventree
{{- end }}
{{- if (index .Values "redis-ha" "enabled") }}
INVENTREE_CACHE_HOST: "{{ .Release.Name }}-redis-ha"
INVENTREE_CACHE_PORT: 6379
{{- end }}
{{ end }}

{{- define "inventree.hardcodedValues" -}}
# Set the nameOverride based on the release name if no override has been set
{{ if not .Values.global.nameOverride }}
global:
  nameOverride: "{{ .Release.Name }}"
{{ end }}

controllers:
  inventree:
    initContainers:
      migrate:
        env:
          {{ include "inventree.sharedEnv" . | nindent 10 }}
    containers:
      server:
        env:
          {{ include "inventree.sharedEnv" . | nindent 10 }}
      worker:
        env:
          {{ include "inventree.sharedEnv" . | nindent 10 }}
{{- end -}}
{{- $_ := mergeOverwrite .Values (include "inventree.hardcodedValues" . | fromYaml) -}}

{{/* Render the templates */}}
{{ include "bjw-s.common.loader.generate" . }}
