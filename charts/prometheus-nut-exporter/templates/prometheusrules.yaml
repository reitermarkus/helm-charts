{{- if and .Values.metrics.enabled .Values.metrics.prometheusRule.enabled }}
{{- include "bjw-s.common.loader.init" . }}
{{- $fullName := (include "bjw-s.common.lib.chart.names.fullname" .) -}}
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "bjw-s.common.lib.metadata.allLabels" . | nindent 4 }}
    {{- with .Values.metrics.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: {{ $fullName }}
      rules:
        - alert: NutExporterAbsent
          annotations:
            description: NUT Exporter has disappeared from Prometheus target discovery.
            summary: NUT Exporter is down.
          expr: |
            absent(up{job="{{ $fullName }}"} == 1)
          for: 5m
          labels:
            severity: critical
        {{- range .Values.metrics.serviceMonitor.targets }}
        - alert: NutExporterTargetAbsent
          annotations:
            description: NUT Exporter target has disappeared.
            summary: NUT Exporter target is down.
          expr: |
            absent(up{job="{{ $fullName }}", target="{{ .hostname }}:{{ .port }}"} == 1)
          for: 5m
          labels:
            severity: critical
        {{- end }}
        - alert: UpsOnBattery
          annotations:
            description: UPS {{ "{{ $labels.ups }}" }} has lost power and is running on battery.
            summary: UPS is running on battery.
          expr: |
            nut_ups_status{job="{{ $fullName }}", status=~"[OL]B"} == 1
          for: 10s
          labels:
            severity: critical
        - alert: UpsLowBattery
          annotations:
            description: UPS {{ "{{ $labels.ups }}" }} battery is low and the system is getting
              ready to shutdown.
            summary: UPS battery is low.
          expr: |
            nut_ups_status{job="{{ $fullName }}", status="LB"} == 1
          for: 5s
          labels:
            severity: critical
        {{- with .Values.metrics.prometheusRule.rules }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
